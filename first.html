<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Reel Script Generator - Premium</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:30px;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:fadeIn 0.6s ease-in-out;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#1c1c3c;
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.result-item{
  margin-top:15px;
  padding:15px;
  background:#1a1a2e;
  border-radius:15px;
}

.copy-btn{
  margin-top:10px;
  background:#00c6ff;
}

.loader{
  border:4px solid #1a1a2e;
  border-top:4px solid #ff512f;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
  margin:auto;
  display:none;
}

@keyframes spin{
  100%{ transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.viral-score{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
  color:#00ffcc;
}

/* Mobile Responsive */
@media(max-width:768px){
  h1{font-size:22px;}
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Viral Reel Script Generator (Premium)</h1>

<div class="card">
  <input type="text" id="niche" placeholder="Enter Niche (Fitness, Cafe, Business)">
  <input type="text" id="topic" placeholder="Enter Topic (Weight Loss, Growth Tips)">
  
  <select id="tone">
    <option>Motivational</option>
    <option>Funny</option>
    <option>Luxury</option>
    <option>Sales</option>
  </select>

  <button onclick="generateReels()">Generate Viral Scripts</button>
</div>

<div class="card">
  <div class="loader" id="loader"></div>
  <div id="results"></div>
</div>

</div>

<script>
function generateReels(){

  let niche = document.getElementById("niche").value || "Business";
  let topic = document.getElementById("topic").value || "Growth Tips";
  let tone = document.getElementById("tone").value;

  let results = document.getElementById("results");
  let loader = document.getElementById("loader");

  results.innerHTML="";
  loader.style.display="block";

  setTimeout(()=>{

    loader.style.display="none";

    for(let i=1;i<=5;i++){

      let hook = `STOP Scrolling! 🔥 ${tone} truth about ${topic} in ${niche}!`;

      let script = `
1️⃣ Most people in ${niche} ignore this about ${topic}.
2️⃣ That’s why they fail.
3️⃣ Here’s the secret method you should try today.
`;

      let cta = `Follow for more ${niche} secrets 🚀`;

      let hashtags = `
#${niche.replace(" ","")}
#${topic.replace(" ","")}
#ViralReel
#ExplorePage
#TrendingNow
`;

      let fullScript = hook + "\n\n" + script + "\n" + cta + "\n\n" + hashtags;

      let score = Math.floor(Math.random()*20)+80;

      results.innerHTML += `
      <div class="result-item">
        <h3>🎬 Script Variation ${i}</h3>
        <p>${fullScript}</p>
        <div class="viral-score">🔥 Viral Score: ${score}/100</div>
        <button class="copy-btn" onclick="copyText(\`${fullScript}\`)">Copy Script</button>
      </div>
      `;

      saveHistory(fullScript,score);
    }

  },1500);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied Successfully ✅");
}

function saveHistory(script,score){
  let history = JSON.parse(localStorage.getItem("reelHistory")) || [];
  history.push({script:script, score:score, date:new Date().toLocaleString()});
  localStorage.setItem("reelHistory",JSON.stringify(history));
}
</script>

</body>
</html>
