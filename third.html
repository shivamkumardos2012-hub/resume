<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium AI Caption Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    transition:0.4s;
}

.container{
    width:95%;
    max-width:650px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:20px;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:90px;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
    resize:none;
    font-size:15px;
}

.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

select,input{
    padding:8px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.generate-btn{
    width:100%;
    margin-bottom:15px;
    background:white;
}

button:hover{
    transform:scale(1.05);
}

.preview{
    background:white;
    color:black;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

.profile{
    width:40px;
    height:40px;
    background:linear-gradient(45deg,pink,orange);
    border-radius:50%;
}

.username{
    font-weight:bold;
    margin-top:5px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.dark-mode{
    background:#111 !important;
}

.dark-mode .container{
    background:rgba(0,0,0,0.6);
    color:white;
}

.dark-mode .preview{
    background:#222;
    color:white;
}

ul{
    list-style:none;
    margin-top:10px;
}

li{
    font-size:13px;
    margin:4px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 AI Caption Generator</h1>

<textarea id="topic" placeholder="Enter your topic..."></textarea>

<div class="options">
<select id="tone">
<option value="funny">Funny 😄</option>
<option value="attitude">Attitude 😎</option>
<option value="romantic">Romantic ❤️</option>
<option value="motivational">Motivational 💪</option>
</select>

<select id="length">
<option value="short">Short</option>
<option value="medium">Medium</option>
<option value="long">Long</option>
</select>

<label>Emoji Level</label>
<input type="range" id="emojiLevel" min="1" max="5" value="3">
</div>

<button class="generate-btn" onclick="generateCaption()">Generate Caption</button>

<div class="preview">
<div class="profile"></div>
<div class="username">your_username</div>
<p id="captionOutput"></p>
<p id="viralScore"></p>
</div>

<div class="buttons">
<button onclick="copyCaption()">Copy</button>
<button onclick="toggleDark()">Dark Mode</button>
</div>

<h3 style="margin-top:15px;">Saved Captions</h3>
<ul id="history"></ul>

</div>

<script>
function generateCaption(){

let topic=document.getElementById("topic").value;
let tone=document.getElementById("tone").value;
let length=document.getElementById("length").value;
let emojiLevel=document.getElementById("emojiLevel").value;

if(topic===""){
    alert("Please enter a topic!");
    return;
}

let emoji="🔥".repeat(emojiLevel);
let caption="";

if(tone==="funny"){
caption=`${topic} but make it dramatic 😂 ${emoji}`;
}
else if(tone==="attitude"){
caption=`${topic} — I don't follow trends, I set them 😎 ${emoji}`;
}
else if(tone==="romantic"){
caption=`${topic} feels better with you ❤️ ${emoji}`;
}
else{
caption=`${topic} — Never give up 💪 ${emoji}`;
}

if(length==="medium"){
caption+=" Stay focused.";
}
if(length==="long"){
caption+=" Keep pushing yourself because greatness takes time and consistency.";
}

document.getElementById("captionOutput").innerText=caption;

let score=Math.floor(Math.random()*40)+60;
document.getElementById("viralScore").innerText="🔥 Viral Score: "+score+"/100";

saveHistory(caption);
}

function copyCaption(){
let text=document.getElementById("captionOutput").innerText;
navigator.clipboard.writeText(text);
alert("Copied ✅");
}

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

function saveHistory(caption){
let history=JSON.parse(localStorage.getItem("captions"))||[];
history.unshift(caption);
history=history.slice(0,5);
localStorage.setItem("captions",JSON.stringify(history));
displayHistory();
}

function displayHistory(){
let history=JSON.parse(localStorage.getItem("captions"))||[];
let list=document.getElementById("history");
list.innerHTML="";
history.forEach(cap=>{
let li=document.createElement("li");
li.innerText=cap;
list.appendChild(li);
});
}

displayHistory();
</script>

</body>
</html>
